name: Docker Image

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write # GHCR(dev) 푸시
  id-token: write # AWS OIDC(main) 인증

env:
  GHCR_IMAGE: ghcr.io/kim-n-kang/manyak-server
  ECR_REPOSITORY: manyak-server
  AWS_REGION: ap-northeast-2

jobs:
  build:
    name: Test and build image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # dev 푸시 → 개발용 GHCR
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # main 푸시 → 배포용 ECR (OIDC, 장기 키 미보관)
      - name: Configure AWS credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/amazon-ecr-login@v2

      # 대상 레지스트리/태그 결정: main → ECR(latest, short-sha), 그 외 → GHCR(dev, short-sha)
      - name: Resolve image tags
        id: image-tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            REGISTRY="${{ steps.ecr-login.outputs.registry }}"
            {
              echo "tags<<EOF"
              echo "${REGISTRY}/${ECR_REPOSITORY}:latest"
              echo "${REGISTRY}/${ECR_REPOSITORY}:${SHORT_SHA}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "tags<<EOF"
              echo "${GHCR_IMAGE}:dev"
              echo "${GHCR_IMAGE}:${SHORT_SHA}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main') }}
          tags: ${{ steps.image-tags.outputs.tags }}

  # main 푸시(ECR 갱신) 후 → SSM Run Command 로 EC2에 배포 + 헬스 스모크
  deploy:
    name: Deploy to EC2 (prod)
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve target EC2 instance
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=manyak" "Name=tag:Name,Values=manyak-prod-app" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId | [0]" --output text)
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::running 상태의 manyak-prod-app EC2를 찾지 못했습니다 (terraform apply 선행 필요)"; exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "대상 인스턴스: $INSTANCE_ID"

      - name: Deploy via SSM Run Command
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.ec2.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "manyak deploy ${GITHUB_SHA::7}" \
            --parameters commands='bash /opt/manyak/deploy.sh' \
            --query "Command.CommandId" --output text)
          echo "SSM CommandId: $CMD_ID"
          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "${{ steps.ec2.outputs.instance_id }}" || true
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "${{ steps.ec2.outputs.instance_id }}" \
            --query "Status" --output text)
          echo "명령 상태: $STATUS"
          aws ssm get-command-invocation --command-id "$CMD_ID" \
            --instance-id "${{ steps.ec2.outputs.instance_id }}" \
            --query "StandardErrorContent" --output text || true
          [ "$STATUS" = "Success" ]

      - name: Smoke test (/actuator/health)
        run: |
          for i in $(seq 1 12); do
            if curl -fsS https://api.manyak.app/actuator/health | grep -q '"status":"UP"'; then
              echo "✅ health UP"; exit 0
            fi
            echo "health 대기 $i/12 (15s)..."; sleep 15
          done
          echo "::error::health 200/UP 확인 실패 — 롤백 검토 (infra/terraform/README 참조)"; exit 1
