spring:
  application:
    name: manyak-server
  profiles:
    default: local

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

manyak:
  ai:
    base-url: ${MANYAK_AI_BASE_URL}
  cors:
    allowed-origins: ${MANYAK_CORS_ALLOWED_ORIGINS}
