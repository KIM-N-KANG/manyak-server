spring:
  application:
    name: manyak-server
  profiles:
    default: local
  data:
    redis:
      # 로컬은 docker-compose의 redis(기본 6379). MANYAK_REDIS_PORT로 게시 포트를 바꾸면 앱도 같이 따라가도록 폴백한다.
      # 운영은 ElastiCache endpoint를 env(SPRING_DATA_REDIS_*)로 주입한다(KNK-284). Lettuce는 지연 연결이라
      # Redis 미가용 시에도 컨텍스트 로딩은 실패하지 않으며, 운영 health에서는 Redis를 분리한다(application-prod.yml).
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:${MANYAK_REDIS_PORT:6379}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

manyak:
  auth:
    jwt:
      # access JWT(HS256) 서명·검증용 대칭키. 운영은 env(MANYAK_AUTH_JWT_SECRET)로 주입한다.
      # 기본값은 빈 문자열이라 미주입 시 빈 초기화에서 실패한다(잘못된 운영 기동을 조기 차단). 최소 32바이트 필요.
      secret: ${MANYAK_AUTH_JWT_SECRET:}
      # 발급자(iss) 클레임. 검증 시 동일 issuer만 허용한다.
      issuer: manyak
      # access 토큰 수명(짧게). 만료되면 refresh로 회전한다.
      access-ttl: PT30M
      # refresh 토큰 수명(길게). RefreshTokenStore TTL과 동일하다.
      refresh-ttl: P14D
    google:
      # 허용할 Google OAuth client-id 목록. ID 토큰의 aud가 이 중 하나와 일치해야 로그인이 통과한다.
      # 콤마 구분 환경변수(MANYAK_GOOGLE_CLIENT_IDS)로 주입한다. 운영 값은 하드코딩하지 않는다(미주입 시 빈 목록 → 모든 토큰 거부).
      client-ids: ${MANYAK_GOOGLE_CLIENT_IDS:}
  ai:
    base-url: ${MANYAK_AI_BASE_URL}
  cors:
    allowed-origins: ${MANYAK_CORS_ALLOWED_ORIGINS}
  slack:
    # 신규 피드백 알림용 Incoming Webhook URL. 미설정(빈 값)이면 알림 발송을 건너뛴다.
    feedback-webhook-url: ${MANYAK_SLACK_FEEDBACK_WEBHOOK_URL:}
  analytics:
    # 익명 ID 해시에 섞는 pepper. 미설정(빈 값)이면 무염 해시. 운영에서 추측 공격 완화용으로 설정 권장.
    device-id-pepper: ${MANYAK_ANALYTICS_DEVICE_ID_PEPPER:}

sentry:
  # DSN 미설정(빈 값)이면 Sentry는 비활성(no-op)이다. 운영에서 SENTRY_DSN으로 주입한다.
  dsn: ${SENTRY_DSN:}
  # 배포 환경 구분(local/production 등). 운영에서 SENTRY_ENVIRONMENT로 주입한다.
  environment: ${SENTRY_ENVIRONMENT:local}
  # 트레이싱 표본율(0=비활성). 운영에서 SENTRY_TRACES_SAMPLE_RATE로 조정한다.
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.0}
  # 예외는 @RestControllerAdvice·SSE·Slack 지점에서 코드로만 캡처하고, 식별자/원문 PII는 보내지 않는다.
  send-default-pii: false
