spring:
  application:
    name: manyak-server
  profiles:
    default: local
  data:
    redis:
      # 로컬은 docker-compose의 redis(기본 6379). MANYAK_REDIS_PORT로 게시 포트를 바꾸면 앱도 같이 따라가도록 폴백한다.
      # 운영은 ElastiCache endpoint를 env(SPRING_DATA_REDIS_*)로 주입한다(KNK-284). Lettuce는 지연 연결이라
      # Redis 미가용 시에도 컨텍스트 로딩은 실패하지 않으며, 운영 health에서는 Redis를 분리한다(application-prod.yml).
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:${MANYAK_REDIS_PORT:6379}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

manyak:
  auth:
    jwt:
      # access JWT(HS256) 서명·검증용 대칭키. 운영은 env(MANYAK_AUTH_JWT_SECRET)로 주입한다.
      # 기본값은 빈 문자열이라 미주입 시 빈 초기화에서 실패한다(잘못된 운영 기동을 조기 차단). 최소 32바이트 필요.
      secret: ${MANYAK_AUTH_JWT_SECRET:}
      # 발급자(iss) 클레임. 검증 시 동일 issuer만 허용한다.
      issuer: manyak
      # access 토큰 수명(짧게). 만료되면 refresh로 회전한다.
      access-ttl: PT30M
      # refresh 토큰 수명(길게). RefreshTokenStore TTL과 동일하다.
      refresh-ttl: P14D
    google:
      # 허용할 Google OAuth client-id 목록. ID 토큰의 aud가 이 중 하나와 일치해야 로그인이 통과한다.
      # 콤마 구분 환경변수(MANYAK_GOOGLE_CLIENT_IDS)로 주입한다. 운영 값은 하드코딩하지 않는다(미주입 시 빈 목록 → 모든 토큰 거부).
      client-ids: ${MANYAK_GOOGLE_CLIENT_IDS:}
  ai:
    base-url: ${MANYAK_AI_BASE_URL}
  asset:
    # 프로필 프리셋 이미지(static/profile-presets/{명사}.png) 서빙 base URL(스펙 §4-5 B7).
    # profile_image_url = base-url + "/profile-presets/{명사}.png". 후속 S3/CDN 전환은 이 값 치환만으로 된다.
    profile-preset-base-url: ${MANYAK_ASSET_BASE_URL:https://api.manyak.app}
    # 스토리 썸네일·채팅 이미지 CDN base URL(스펙 §4-3-9). URL = base-url + "/{prefix}/{imageKey}.png".
    # 프로필 프리셋(서버 static)과 달리 S3 + CloudFront라 저장소·정본이 다르다.
    # 운영 기본값을 굽는다(프로필 프리셋과 같은 관례). 이 값이 user-data env로 주입될 필요가 없어져
    # 인프라 쪽 인스턴스 교체 apply가 불필요하다. 전제: 자산 업로드가 main 릴리스보다 선행해야 한다.
    # 빈 값으로 덮으면 썸네일 URL은 null이 되고 프론트엔드가 placeholder를 표시한다(서버는 정상 기동).
    image-base-url: ${MANYAK_IMAGE_BASE_URL:https://cdn.manyak.app}
  cors:
    allowed-origins: ${MANYAK_CORS_ALLOWED_ORIGINS}
  credit:
    # 적립·소모 정책값(스펙 §4-3-7, KNK-477 확정 · KNK-449). 서비스 @Value 기본값과 같은 수치를 명시해 운영 조정 경로를 남긴다.
    signup-reward: ${MANYAK_CREDIT_SIGNUP_REWARD:500}
    invite-reward: ${MANYAK_CREDIT_INVITE_REWARD:500}
    invite-monthly-cap: ${MANYAK_CREDIT_INVITE_MONTHLY_CAP:10}
    attendance-reward: ${MANYAK_CREDIT_ATTENDANCE_REWARD:250}
    story-creation-cost: ${MANYAK_CREDIT_STORY_CREATION_COST:20}
    chat-turn-cost: ${MANYAK_CREDIT_CHAT_TURN_COST:10}
    reconciliation:
      # 선차감 대사 배치 on/off(스펙 §4-3-7, KNK-448). 유실 환불을 사후 보정한다. 테스트 프로파일은 끈다.
      enabled: ${MANYAK_CREDIT_RECONCILIATION_ENABLED:true}
      # 실행 주기(ms, fixedDelay). 기본 15분.
      interval-ms: ${MANYAK_CREDIT_RECONCILIATION_INTERVAL_MS:900000}
      # 부팅 후 첫 실행까지 지연(ms). 기동 직후 부하를 피한다.
      initial-delay-ms: ${MANYAK_CREDIT_RECONCILIATION_INITIAL_DELAY_MS:60000}
      # 그룹의 마지막 charge가 이 시간보다 오래됐을 때만 대사한다(in-flight 경합 배제).
      charge-age-threshold: ${MANYAK_CREDIT_RECONCILIATION_CHARGE_AGE_THRESHOLD:PT15M}
  guest-trial:
    # 게스트 체험 한도(스펙 §4-3-7, KNK-477 확정 → KNK-480 축소). 디바이스 ID별 Redis 카운터 3종, TTL 없음(Phase 1).
    storyline-generation-limit: ${MANYAK_GUEST_TRIAL_STORYLINE_LIMIT:5}
    story-creation-limit: ${MANYAK_GUEST_TRIAL_STORY_CREATION_LIMIT:1}
    chat-turn-limit: ${MANYAK_GUEST_TRIAL_CHAT_TURN_LIMIT:5}
  slack:
    # 신규 피드백 알림용 Incoming Webhook URL. 미설정(빈 값)이면 알림 발송을 건너뛴다.
    feedback-webhook-url: ${MANYAK_SLACK_FEEDBACK_WEBHOOK_URL:}
  google-form:
    # 구글 폼 formResponse 베이스 URL(교체 불필요, 테스트에서만 mock 으로 override).
    base-url: ${MANYAK_GOOGLE_FORM_BASE_URL:https://docs.google.com}
    feedback:
      # 신규 피드백을 적재할 구글 폼(→ 연결된 스프레드시트). form-id/body-entry-id 미설정이면 건너뛴다.
      # entry-id 는 폼 재생성 시 바뀌므로 폼과 함께 갱신한다(값은 공개 식별자라 secret 아님).
      form-id: ${MANYAK_GOOGLE_FORM_FEEDBACK_ID:1FAIpQLSd1myQU4_KC3R7k6y4fNNtWyl4DmYOh87Uswsx7FI2FnLPeGg}
      body-entry-id: ${MANYAK_GOOGLE_FORM_FEEDBACK_BODY_ENTRY:1064236498}
      email-entry-id: ${MANYAK_GOOGLE_FORM_FEEDBACK_EMAIL_ENTRY:1084788855}
      platform-entry-id: ${MANYAK_GOOGLE_FORM_FEEDBACK_PLATFORM_ENTRY:486778658}
      app-version-entry-id: ${MANYAK_GOOGLE_FORM_FEEDBACK_APP_VERSION_ENTRY:1401396038}
  analytics:
    # device_id 해시에 섞는 pepper. 미설정(빈 값)이면 무염 해시. 운영에서 추측 공격 완화용으로 설정 권장.
    # 전환기(KNK-317): 새 env가 없으면 구 MANYAK_ANALYTICS_ANONYMOUS_ID_PEPPER로 fallback. 롤아웃 완료 후 fallback 제거.
    device-id-pepper: ${MANYAK_ANALYTICS_DEVICE_ID_PEPPER:${MANYAK_ANALYTICS_ANONYMOUS_ID_PEPPER:}}
    amplitude:
      # 서버 분석 이벤트(server_*) Amplitude 발행 스위치(스펙 §4-7 B1, KNK-514). 기본 off — 켜고 api-key가 있어야 발행한다.
      # 미설정/off면 발행 파사드는 정상 동작하되 싱크가 no-op이라 운영·로컬·테스트에서 조용히 꺼진다.
      enabled: ${MANYAK_ANALYTICS_AMPLITUDE_ENABLED:false}
      # Amplitude 프로젝트 API 키. 운영은 env/secret(MANYAK_AMPLITUDE_API_KEY)로 주입한다. 빈 값이면 발행하지 않는다.
      api-key: ${MANYAK_AMPLITUDE_API_KEY:}
      # HTTP V2 API 베이스 URL. 리전에 따라 api2.amplitude.com(US) 또는 api.eu.amplitude.com(EU).
      base-url: ${MANYAK_AMPLITUDE_BASE_URL:https://api2.amplitude.com}

sentry:
  # DSN 미설정(빈 값)이면 Sentry는 비활성(no-op)이다. 운영에서 SENTRY_DSN으로 주입한다.
  dsn: ${SENTRY_DSN:}
  # 배포 환경 구분(local/production 등). 운영에서 SENTRY_ENVIRONMENT로 주입한다.
  environment: ${SENTRY_ENVIRONMENT:local}
  # 트레이싱 표본율(0=비활성). 운영에서 SENTRY_TRACES_SAMPLE_RATE로 조정한다.
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.0}
  # 예외는 @RestControllerAdvice·SSE·Slack 지점에서 코드로만 캡처하고, 식별자/원문 PII는 보내지 않는다.
  send-default-pii: false
