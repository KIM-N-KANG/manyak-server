spring:
  datasource:
    url: ${MANYAK_DB_URL}
    username: ${MANYAK_DB_USERNAME}
    password: ${MANYAK_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

manyak:
  auth:
    jwt:
      # 로컬 개발 전용 더미 키(>=32바이트). 운영은 절대 이 값을 쓰지 않고 env(MANYAK_AUTH_JWT_SECRET)로 주입한다.
      secret: local-dev-only-jwt-secret-change-me-please-32b
    google:
      # 로컬 더미 client-id를 기본값으로 두되 env로 덮어쓸 수 있게 한다.
      # 실제 Google 로그인을 로컬에서 검증하려면 MANYAK_GOOGLE_CLIENT_IDS=<본인 OAuth client-id>로 주입한다.
      client-ids: ${MANYAK_GOOGLE_CLIENT_IDS:local-dev-only.apps.googleusercontent.com}
  ai:
    chat:
      stub: true
    # 스토리 컴파일은 실제 LLM이라 수십 초~2분 걸린다. 로컬 수동 검증에서는 스텁으로 즉답 처리한다(KNK-71).
    story:
      stub: true
