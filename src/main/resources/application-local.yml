spring:
  datasource:
    url: ${MANYAK_DB_URL}
    username: ${MANYAK_DB_USERNAME}
    password: ${MANYAK_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

manyak:
  auth:
    jwt:
      # 로컬 개발 전용 더미 키(>=32바이트). 운영은 절대 이 값을 쓰지 않고 env(MANYAK_AUTH_JWT_SECRET)로 주입한다.
      secret: local-dev-only-jwt-secret-change-me-please-32b
    google:
      # 로컬 더미 client-id. 실제 Google 로그인 검증에는 본인 OAuth client-id를 env(MANYAK_GOOGLE_CLIENT_IDS)로 주입한다.
      client-ids: local-dev-only.apps.googleusercontent.com
  ai:
    chat:
      stub: true
