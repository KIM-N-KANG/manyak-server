spring:
  datasource:
    url: ${MANYAK_DB_URL}
    username: ${MANYAK_DB_USERNAME}
    password: ${MANYAK_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

manyak:
  # auth.jwt.secret 은 여기에 하드코딩하지 않는다. 운영은 env(MANYAK_AUTH_JWT_SECRET)로만 주입한다(application.yml 기본 바인딩).
  ai:
    chat:
      # 운영은 실제 manyak-ai 호출 (local만 stub)
      stub: false

management:
  health:
    redis:
      # KNK-284: ElastiCache 접속정보(SPRING_DATA_REDIS_HOST/PORT)가 .env로 주입됨 → Redis health 재활성화.
      # refresh 토큰 저장이 Redis에 의존하므로, Redis 장애를 /actuator/health(ALB·배포 스모크)가 감지하도록 켠다.
      enabled: true
