spring:
  datasource:
    url: ${MANYAK_DB_URL}
    username: ${MANYAK_DB_USERNAME}
    password: ${MANYAK_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

manyak:
  ai:
    chat:
      # 운영은 실제 manyak-ai 호출 (local만 stub)
      stub: false
