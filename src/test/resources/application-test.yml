spring:
  datasource:
    url: jdbc:h2:mem:manyak-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      # create-drop이 아니라 create다. 컨텍스트가 캐시에서 축출돼 닫힐 때 create-drop은 종료 시 DROP을 돌리는데,
      # 모든 컨텍스트가 같은 H2(jdbc:h2:mem:manyak-test)를 공유하므로 그 DROP이 아직 쓰는 컨텍스트의 스키마까지
      # 통째로 떨어뜨린다. DatabaseCleaner는 information_schema를 읽어 지우므로 테이블이 0개면 조용히 통과하고,
      # 증상은 한참 뒤 "Table not found"로 드러난다(무작위 클래스 순서에서 재현, KNK-686).
      # create는 부팅 시 drop+create를 그대로 하므로 스키마 초기화는 동일하고, 종료 시 DROP만 사라진다.
      ddl-auto: create
    open-in-view: false
  flyway:
    enabled: false

management:
  health:
    redis:
      # 테스트는 Redis 인프라 없이 돈다. health를 Redis 가용성과 분리해 /actuator/health가 항상 200이도록 비활성화.
      enabled: false

manyak:
  auth:
    jwt:
      # 테스트 전용 고정 키(>=32바이트). 운영 키와 무관한 더미 값이다.
      secret: test-only-jwt-secret-fixed-value-32-bytes-min
    google:
      # 테스트 전용 더미 client-id. 통합 테스트는 가짜 verifier(@Primary)를 쓰므로 실제 검증에는 쓰이지 않는다.
      client-ids: test-only.apps.googleusercontent.com
  ai:
    base-url: http://localhost:8000
    chat:
      stub: true
  cors:
    allowed-origins: http://localhost:3000,http://192.168.0.12:3000
  credit:
    reconciliation:
      # 테스트는 대사 배치 스케줄러를 끈다. 대사 로직은 CreditReconciliationIntegrationTests가 서비스를 직접 호출해 검증한다.
      enabled: false
  slack:
    # 테스트는 외부로 절대 발송하지 않는다. 환경변수 오염까지 막는 최종 보장은 통합 테스트의 @DynamicPropertySource.
    feedback-webhook-url: ""
  google-form:
    feedback:
      # 테스트는 외부(구글)로 절대 발송하지 않는다. form-id 를 비워 발송을 끈다.
      form-id: ""
