spring:
  datasource:
    url: jdbc:h2:mem:manyak-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false

management:
  health:
    redis:
      # 테스트는 Redis 인프라 없이 돈다. health를 Redis 가용성과 분리해 /actuator/health가 항상 200이도록 비활성화.
      enabled: false

manyak:
  auth:
    jwt:
      # 테스트 전용 고정 키(>=32바이트). 운영 키와 무관한 더미 값이다.
      secret: test-only-jwt-secret-fixed-value-32-bytes-min
    google:
      # 테스트 전용 더미 client-id. 통합 테스트는 가짜 verifier(@Primary)를 쓰므로 실제 검증에는 쓰이지 않는다.
      client-ids: test-only.apps.googleusercontent.com
  ai:
    base-url: http://localhost:8000
    chat:
      stub: true
  cors:
    allowed-origins: http://localhost:3000,http://192.168.0.12:3000
  credit:
    reconciliation:
      # 테스트는 대사 배치 스케줄러를 끈다. 대사 로직은 CreditReconciliationIntegrationTests가 서비스를 직접 호출해 검증한다.
      enabled: false
  slack:
    # 테스트는 외부로 절대 발송하지 않는다. 환경변수 오염까지 막는 최종 보장은 통합 테스트의 @DynamicPropertySource.
    feedback-webhook-url: ""
