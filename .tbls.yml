# tbls 설정 — 실 DB 스키마에서 문서(dbdoc/)를 자동 생성한다.
# Flyway 마이그레이션이 진실원본이고, 이 문서는 거기서 파생된 "현행 스키마"다.
# 목표(설계) 스키마는 docs/schema-roadmap.sql 을 본다.
#
# DSN은 비밀을 커밋하지 않도록 환경변수로 주입한다.
#   - 로컬:  scripts/gen-db-docs.sh
#   - CI:    .github/workflows/db-docs.yml
dsn: "${TBLS_DSN}"

# README 제목(문서 이름)을 고정한다 — 미설정 시 로컬 .env의 DB 이름에서 유도돼
# 개발자/CI마다 제목이 달라져 드리프트가 날 수 있다.
name: manyak

docPath: dbdoc

# ER 다이어그램은 mermaid로 출력한다 — 마크다운에 임베드되어 SVG 바이너리 없이 텍스트만 남고,
# 재생성 시 결정적이라 'tbls doc 재생성 + git diff' 드리프트 게이트가 안정적으로 동작한다.
er:
  format: mermaid

# Flyway 메타테이블은 문서 대상에서 제외한다(스키마명까지 매칭).
exclude:
  - flyway_schema_history
  - public.flyway_schema_history
