services:
  postgres:
    image: postgres:16-alpine
    container_name: manyak-postgres
    environment:
      POSTGRES_DB: ${MANYAK_DB_NAME:?MANYAK_DB_NAME 값이 필요합니다}
      POSTGRES_USER: ${MANYAK_DB_USERNAME:?MANYAK_DB_USERNAME 값이 필요합니다}
      POSTGRES_PASSWORD: ${MANYAK_DB_PASSWORD:?MANYAK_DB_PASSWORD 값이 필요합니다}
    ports:
      - "${MANYAK_DB_PORT:?MANYAK_DB_PORT 값이 필요합니다}:5432"
    volumes:
      - manyak-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    # 운영 ElastiCache 7.1과 메이저 일치(redis 7). AUTH/TLS 없는 로컬 개발용.
    image: redis:7-alpine
    container_name: manyak-redis
    ports:
      - "${MANYAK_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  manyak-postgres-data:
