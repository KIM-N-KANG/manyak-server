services:
  postgres:
    image: postgres:16-alpine
    container_name: manyak-postgres
    environment:
      POSTGRES_DB: ${MANYAK_DB_NAME:?MANYAK_DB_NAME 값이 필요합니다}
      POSTGRES_USER: ${MANYAK_DB_USERNAME:?MANYAK_DB_USERNAME 값이 필요합니다}
      POSTGRES_PASSWORD: ${MANYAK_DB_PASSWORD:?MANYAK_DB_PASSWORD 값이 필요합니다}
    ports:
      - "${MANYAK_DB_PORT:?MANYAK_DB_PORT 값이 필요합니다}:5432"
    volumes:
      - manyak-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  manyak-postgres-data:
