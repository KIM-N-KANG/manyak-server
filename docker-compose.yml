services:
  postgres:
    image: postgres:16-alpine
    container_name: manyak-postgres
    environment:
      POSTGRES_DB: manyak
      POSTGRES_USER: manyak
      POSTGRES_PASSWORD: manyak
    ports:
      - "5432:5432"
    volumes:
      - manyak-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manyak -d manyak"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  manyak-postgres-data:
