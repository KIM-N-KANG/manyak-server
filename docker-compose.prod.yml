# 운영용 compose: server + ai 두 컨테이너.
# DB(PostgreSQL)와 Redis는 RDS/ElastiCache(외부)를 쓰므로 여기엔 없다.
# DB/Redis 접속정보 등 비밀은 KNK-241에서 .env(Secrets Manager 경유)로 주입한다.
# server -> ai 통신은 compose 서비스명 DNS(http://ai:8000) 사용 — localhost 아님.
# 이미지 좌표(SERVER_IMAGE/AI_IMAGE)는 EC2 user-data가 생성한 .env 에서 주입.
services:
  server:
    image: ${SERVER_IMAGE}
    container_name: manyak-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MANYAK_AI_BASE_URL: http://ai:8000
      # CORS 허용 오리진(프론트 도메인). 미지정 시 기본값, .env 로 덮어쓸 수 있다.
      MANYAK_CORS_ALLOWED_ORIGINS: ${MANYAK_CORS_ALLOWED_ORIGINS:-https://manyak.app}
    env_file:
      - .env
    # ai 의존(depends_on) 제거: ai 이미지 미준비 상태에서도 server 가 독립 기동되도록 한다.
    # (server→ai 호출은 런타임 기능이라 부팅엔 불필요. deploy.sh 도 `up -d server` 로 server 만 띄움)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
  ai:
    image: ${AI_IMAGE}
    container_name: manyak-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # ai 전용 Sentry DSN(server 와 다른 프로젝트). .env 의 AI_SENTRY_DSN 을 ai 컨테이너의 SENTRY_DSN 으로 매핑.
      SENTRY_DSN: ${AI_SENTRY_DSN}
      # ai Sentry 이벤트의 environment 태그. .env 의 SENTRY_ENVIRONMENT(user-data 가 prod 로 기록)를 보간해 주입한다.
      # 미주입 시 ai Sentry 가 local 로 폴백한다. server 는 env_file 로 받지만, ai 는 불필요 비밀(DB 크레덴셜 등)
      # 과다 노출을 피하려고 env_file 대신 이 한 줄만 둔다.
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT}
      # DeepSeek API 키(필수). manyak-ai config.py 에 기본값이 없어 미주입 시 부팅 실패.
      # deploy.sh 가 Secrets Manager(manyak/prod/app)의 DEEPSEEK_API_KEY 를 .env 로 기록한다.
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    # 컨테이너 자체 헬스체크. 배포 게이트는 CI 의 SSM 내부 스모크(/api/v1/health)가 담당한다.
    # manyak-ai 는 python:3.11-slim 기반이라 wget/curl 이 없어 stdlib(urllib/json)로 probe 한다(도형 확인·검증).
    # 응답 status=="ok" 면 exit 0, 아니면 exit 1.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,json,sys; sys.exit(0 if json.load(urllib.request.urlopen('http://localhost:8000/api/v1/health',timeout=3)).get('status')=='ok' else 1)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
